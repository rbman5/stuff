# snapshot_info.yml
- hosts: all
  become: true

  tasks:

    - name: Get rootflags
      ansible.builtin.shell: grep -o 'rootflags=\S*' /proc/cmdline
      register: rootflags

    - name: Get snapper list
      ansible.builtin.command: snapper list
      register: snapper_list

    - name: Get btrfs filesystem usage /
      ansible.builtin.command: btrfs filesystem usage /
      register: fs_usage

    - name: Install btrfs-compsize
      ansible.builtin.apt:
        name: btrfs-compsize
        state: present
      become: true
    
    - name: Run compsize
      ansible.builtin.command: compsize -x /
      register: compsize_output
      become: true
    
    - name: Show compsize output
      ansible.builtin.debug:
        msg: "{{ compsize_output.stdout_lines }}"

    - name: Currently booted into
      ansible.builtin.debug:
        msg: "{{ rootflags.stdout }}"

    - name: Available snapshots
      ansible.builtin.debug:
        msg: "{{ snapper_list.stdout_lines }}"

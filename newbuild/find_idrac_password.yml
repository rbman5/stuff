#  - username: "root"
#    password: "{{ vault_idrac_custom_password }}"


# ──────────────────────────────────────────────
# 1. Try each credential pair against the iDRAC
#    Redfish API in parallel (async)
# ──────────────────────────────────────────────
- name: Probe iDRAC with each candidate credential
  ansible.builtin.uri:
    url:              "https://{{ bmc }}/redfish/v1/Systems/System.Embedded.1"
    method:           GET
    user:             "{{ item.username }}"
    password:         "{{ item.password }}"
    validate_certs:   false
    force_basic_auth: true
    status_code:      [200, 201]
    timeout:          10
  loop:             "{{ idrac_credentials }}"
  register:         idrac_auth_results
  ignore_errors:    true
  no_log:           true    # suppress passwords from logs
  loop_control:
    label: "user={{ item.username }}"

# ──────────────────────────────────────────────
# 2. Filter down to only the successful attempts
# ──────────────────────────────────────────────
- name: Build list of working credentials
  ansible.builtin.set_fact:
    working_credentials: >-
      {{
        idrac_auth_results.results
        | selectattr('status', 'equalto', 200)
        | map(attribute='item')
        | list
      }}

# ──────────────────────────────────────────────
# 3. Fail loudly if nothing worked
# ──────────────────────────────────────────────
- name: Fail if no credentials succeeded
  ansible.builtin.fail:
    msg: >
      No valid credentials found for iDRAC {{ bmc }}.
      Tried {{ idrac_credentials | length }} credential pair(s).
  when: working_credentials | length == 0

# ──────────────────────────────────────────────
# 4. Promote the first working credential pair
# ──────────────────────────────────────────────
- name: Set idrac_user and idrac_password from first working credential
  ansible.builtin.set_fact:
    idrac_user:     "{{ working_credentials[0].username }}"
    idrac_password: "{{ working_credentials[0].password }}"
  no_log: true

- name: Report success (username only, never log the password)
  ansible.builtin.debug:
    msg: "Valid iDRAC credential found for {{ bmc }} — username: {{ idrac_user }}"

    

---


- hosts: all
  become: true
  vars:
    snapshot_description: "pre-update-{{ ansible_date_time.date }}_{{ ansible_date_time.hour }}{{ ansible_date_time.minute }}{{ ansible_date_time.second }}"
    rollback_snapshot: "1"
    btrfs_device: /dev/disk/by-id/dm-uuid-LVM-xOUP6ZOmgQcKkBiMSjpJ1nUPQaz3RPYfPI4rfdwZdfSvVnUfOYgvLLHs7HPe6o8a
  tasks:
    - name: Take snapshot
      ansible.builtin.command: snapper -c root create --description "{{ snapshot_description }}" --print-number
      register: snapshot_number

    - name: Show snapshot number
      ansible.builtin.debug:
        msg: "Snapshot number: {{ snapshot_number.stdout }} description: {{ snapshot_description }}"

    - name: update sudo-rs
      apt:
        name: sudo-rs
        state: latest

    - name: Fail if no snapshot number provided
      ansible.builtin.fail:
        msg: "Set rollback_snapshot to the snapshot number you want to roll back to"
      when: rollback_snapshot == ""

    - name: List snapshots before rollback
      ansible.builtin.command: snapper list
      register: snapper_list

    - name: Show snapshots
      ansible.builtin.debug:
        msg: "{{ snapper_list.stdout_lines }}"

    - name: Remount root as rw
      ansible.builtin.command: mount -o remount,rw /
      become: true

    - name: Roll back to snapshot
      ansible.builtin.command: snapper --ambit classic rollback {{ rollback_snapshot }}
      register: rollback_result

    - name: Show rollback result
      ansible.builtin.debug:
        msg: "{{ rollback_result.stdout }}"

    - name: Get new default subvolume ID
      ansible.builtin.shell: btrfs subvolume get-default / | awk '{print $2}'
      register: new_default_id
      tags:
        - fstab
        - grub

    - name: Get new default subvolume path
      ansible.builtin.shell: |
        btrfs subvolume list / | awk '$2 == {{ new_default_id.stdout }} {print $NF}'
      register: new_default_path
      tags:
        - fstab
        - grub

    - name: Show new default subvolume
      ansible.builtin.debug:
        msg: "New default subvolume: {{ new_default_path.stdout }} (ID {{ new_default_id.stdout }})"
      tags:
        - fstab

    - name: Update rootflags subvol in GRUB cmdline
      ansible.builtin.replace:
        path: /etc/default/grub
        regexp: 'rootflags=subvol=\S+'
        replace: 'rootflags=subvol={{ new_default_path.stdout }}'
      become: true
      tags: 
        - grub

    - name: Update root entry in fstab
      ansible.builtin.lineinfile:
        path: /etc/fstab
        regexp: '{{ btrfs_device }}\s+/\s+btrfs'
        line: '{{ btrfs_device }}  /            btrfs  defaults,noatime,discard=async,compress=zstd,subvol={{ new_default_path.stdout }}  0 0'
      tags:
        - fstab

    - name: Update @snapshots entry in fstab
      ansible.builtin.lineinfile:
        path: /etc/fstab
        regexp: '{{ btrfs_device }}\s+/.snapshots\s+btrfs'
        line: '{{ btrfs_device }}  /.snapshots  btrfs  defaults,noatime,discard=async,compress=zstd,subvol=@snapshots  0 0'
      tags:
        - fstab

    - name: Check if UEFI
      ansible.builtin.stat:
        path: /sys/firmware/efi
      register: efi_check

    - name: Reinstall GRUB for BIOS
      ansible.builtin.command: grub-install /dev/vda
      when: not efi_check.stat.exists

    - name: Reinstall GRUB for UEFI
      ansible.builtin.command: grub-install --target=x86_64-efi --efi-directory=/boot/efi --bootloader-id=ubuntu
      when: efi_check.stat.exists

    - name: Update initramfs
      ansible.builtin.command: update-initramfs -u -k all

    - name: Update GRUB
      ansible.builtin.command: update-grub

    - name: Patch rootflags in grub.cfg to point to rollback subvolume
      ansible.builtin.replace:
        path: /boot/grub/grub.cfg
        regexp: 'rootflags=subvol=\S+'
        replace: 'rootflags=subvol={{ new_default_path.stdout }}'
      become: true

    - name: Reboot into rolled back snapshot
      ansible.builtin.reboot:
        reboot_timeout: 300
        post_reboot_delay: 15

    - name: Verify root after rollback
      ansible.builtin.command: findmnt -n -o SOURCE /
      register: root_mount

    - name: Show root mount
      ansible.builtin.debug:
        msg: "Booted into: {{ root_mount.stdout }}"

    - name: Verify fstab root entry is correct
      ansible.builtin.command: grep root_lv /etc/fstab
      
    - name: update sudo-rs
      apt:
        name: sudo-rs
        state: latest
      check_mode: true
      register: testing
      failed_when: not testing.changed


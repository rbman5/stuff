# main.yml
- hosts: all
  become: true
  vars:
    btrfs_device: /dev/disk/by-id/dm-uuid-LVM-xOUP6ZOmgQcKkBiMSjpJ1nUPQaz3RPYfPI4rfdwZdfSvVnUfOYgvLLHs7HPe6o8a

  tasks:

    # ── Install packages ──────────────────────────────────────────
    - name: Install snapper and grub-btrfs
      ansible.builtin.apt:
        name:
          - snapper
          - inotify-tools
        state: present
        update_cache: true

    # ── Check current state ───────────────────────────────────────
    - name: Get current btrfs subvolume list
      ansible.builtin.command: btrfs subvolume list /
      register: subvol_list
      ignore_errors: true

    - name: Check if @ subvolume exists
      ansible.builtin.set_fact:
        at_exists: "{{ subvol_list.stdout | regex_search(' path @$', multiline=True) is not none }}"

    - name: Check if @snapshots subvolume exists
      ansible.builtin.set_fact:
        at_snapshots_exists: "{{ subvol_list.stdout | regex_search(' path @snapshots$', multiline=True) is not none }}"

    - name: Check if root is already mounted as @
      ansible.builtin.command: findmnt -n -o OPTIONS /
      register: root_options

    - name: Set fact for root mounted as @
      ansible.builtin.set_fact:
        root_is_at: "{{ 'subvol=/@' in root_options.stdout }}"

    # ── Create subvolume layout ───────────────────────────────────
    - name: Mount top level btrfs volume
      ansible.builtin.command: mount -o subvolid=5 {{ btrfs_device }} /mnt
      when: not at_exists or not at_snapshots_exists

    - name: Create @ subvolume
      ansible.builtin.command: btrfs subvolume snapshot /mnt /mnt/@
      when: not at_exists

    - name: Create @snapshots subvolume
      ansible.builtin.command: btrfs subvolume create /mnt/@snapshots
      when: not at_snapshots_exists

    - name: Set @ as btrfs default subvolume
      ansible.builtin.shell: |
        ID=$(btrfs subvolume list /mnt | awk '/ path @$/{print $2}')
        btrfs subvolume set-default $ID /mnt
      when: not root_is_at

    - name: Unmount top level
      ansible.builtin.command: umount /mnt
      when: not at_exists or not at_snapshots_exists

    # ── Update fstab ──────────────────────────────────────────────
    - name: Update root entry in fstab
      ansible.builtin.lineinfile:
        path: /etc/fstab
        regexp: '{{ btrfs_device }}\s+/\s+'
        line: '{{ btrfs_device }}  /            btrfs  defaults,noatime,discard=async,compress=zstd,subvol=@           0 0'

    - name: Add @snapshots to fstab
      ansible.builtin.lineinfile:
        path: /etc/fstab
        regexp: '{{ btrfs_device }}\s+/.snapshots\s+'
        line: '{{ btrfs_device }}  /.snapshots  btrfs  defaults,noatime,discard=async,compress=zstd,subvol=@snapshots  0 0'

    # ── Update grub and initramfs ─────────────────────────────────
    - name: Update initramfs
      ansible.builtin.command: update-initramfs -u -k all
      when: not root_is_at

    - name: Update GRUB
      ansible.builtin.command: update-grub
      when: not root_is_at

    # ── Reboot into @ ─────────────────────────────────────────────
    - name: Reboot
      ansible.builtin.reboot:
        reboot_timeout: 300
        post_reboot_delay: 15
      when: not root_is_at

    # ── Verify root is @ ──────────────────────────────────────────
    - name: Verify root is mounted as @
      ansible.builtin.command: findmnt -n -o OPTIONS /
      register: root_options_post
      failed_when: "'subvol=/@' not in root_options_post.stdout"

    # ── Setup /.snapshots mount point ─────────────────────────────
    - name: Check if .snapshots is a btrfs subvolume
      ansible.builtin.command: btrfs subvolume show /.snapshots
      register: snapshots_is_subvol
      ignore_errors: true

    - name: Delete .snapshots subvolume if it exists inside @
      ansible.builtin.command: btrfs subvolume delete /.snapshots
      when: snapshots_is_subvol.rc == 0

    - name: Check if snapper config already exists
      ansible.builtin.stat:
        path: /etc/snapper/configs/root
      register: snapper_config

    - name: Remove .snapshots directory if snapper config does not exist
      ansible.builtin.file:
        path: /.snapshots
        state: absent
      when: not snapper_config.stat.exists

    - name: Create snapper root config
      ansible.builtin.command: snapper -c root create-config /
      when: not snapper_config.stat.exists

    - name: Delete subvolume snapper just created
      ansible.builtin.command: btrfs subvolume delete /.snapshots
      when: not snapper_config.stat.exists

    - name: Recreate .snapshots as plain directory
      ansible.builtin.file:
        path: /.snapshots
        state: directory
        mode: '0750'

    - name: Mount all fstab entries including @snapshots
      ansible.builtin.command: mount -a

    # ── Enable services ───────────────────────────────────────────
    - name: Enable grub-btrfsd
      ansible.builtin.systemd:
        name: grub-btrfsd
        state: started
        enabled: true

    - name: Update GRUB to pick up snapper entries
      ansible.builtin.command: update-grub

    # ── Final verification ────────────────────────────────────────
    - name: List subvolumes
      ansible.builtin.command: btrfs subvolume list /
      register: final_subvol_list

    - name: Verify snapshots are in @snapshots not inside @
      ansible.builtin.fail:
        msg: "Snapshots found inside @ — @snapshots mount is not working correctly"
      when: final_subvol_list.stdout_lines | select('search', 'top level 256 path .snapshots') | list | length > 0

    - name: Show final layout
      ansible.builtin.debug:
        msg: "{{ final_subvol_list.stdout_lines }}"
